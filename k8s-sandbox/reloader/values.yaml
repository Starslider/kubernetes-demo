reloader:
  watchGlobally: true
  reloadOnCreate: true
  syncAfterRestart: true
  readOnlyRootFileSystem: true
  ignoreJobs: true
  ignoreCronJobs: true
  deployment:
    image:
      name: ghcr.io/stakater/reloader
      tag: v1.4.16
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
