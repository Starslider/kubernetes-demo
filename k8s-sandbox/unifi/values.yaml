# UniFi Controller Configuration Reference
#
# This file is no longer used for Helm (we switched to pure Kustomize to avoid
# OCI chart access issues with ArgoCD + ghcr.io).
#
# The actual configuration lives in:
# - deployment.yaml
# - service.yaml
# - pvc.yaml
#
# Key settings are hardcoded for unifi.dhlabs.org:
# - SYSTEM_IP=unifi.dhlabs.org (for device inform URLs)
# - external-dns annotation on the Service
# - LoadBalancer service with required ports
#
# To customize:
# - Edit deployment.yaml for image, resources, env, etc.
# - Edit service.yaml for annotations or additional ports
# - Edit pvc.yaml for storage size / storageClass
#
# After changes: ArgoCD will sync the kustomize overlay.

# We manage ingress ourselves via Gateway API
ingress:
  main:
    enabled: false

# Sensible resource requests for a small-to-medium UniFi deployment
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# Non-root where supported
podSecurityContext:
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false

# === Important notes for unifi.dhlabs.org ===

# 1. external-dns will automatically create a DNS A record for unifi.dhlabs.org
#    pointing to the LoadBalancer IP (because of the annotation above).

# 2. SYSTEM_IP is set via extraEnvVars to "unifi.dhlabs.org".
#    Devices will be told to use https://unifi.dhlabs.org:8443/inform

# 3. Adoption command for switches (run via SSH on the switch or through the UI):
#      set-inform https://unifi.dhlabs.org:8443/inform

# 4. Browser access:
#    - Preferred (with proper Let's Encrypt cert): https://unifi.dhlabs.org
#      (routed through your Gateway + wildcard cert)
#    - Direct (controller's own cert): https://unifi.dhlabs.org:8443

# 5. After deploying, verify:
#      kubectl -n unifi get svc unifi -o wide
#      dig unifi.dhlabs.org   # should return the LB IP

# Additional operational notes:
# - Unified LB service exposes 8080/TCP, 8443/TCP, plus UDP ports for discovery & STUN.
# - Make sure your switches can reach the LB IP (or the domain) on these ports.
# - Enable scheduled backups from inside the UniFi web UI.
# - For nice metrics in Grafana, deploy Unpoller as a companion.
#
# Always take a controller backup before upgrading the image or chart version.
