apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-os-server
  labels:
    app: unifi-os-server
    app.kubernetes.io/name: unifi-os-server
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-os-server
  template:
    metadata:
      labels:
        app: unifi-os-server
        app.kubernetes.io/name: unifi-os-server
        app.kubernetes.io/component: controller
    spec:
      containers:
        - name: unifi-os-server
          image: ghcr.io/lemker/unifi-os-server:v1.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: UOS_SYSTEM_IP
              value: "unifi.dhlabs.org"
          securityContext:
            privileged: true
          lifecycle:
            postStart:
              exec:
                command: ["/bin/bash", "-c", "echo $HOST_IP host.docker.internal >> /etc/hosts"]
          ports:
            - name: webui
              containerPort: 443
              protocol: TCP
            - name: communication
              containerPort: 8080
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: discovery
              containerPort: 10003
              protocol: UDP
            - containerPort: 11084
              hostPort: 11084
              hostIP: 127.0.0.1
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
            - name: run-tmpfs
              mountPath: /run
            - name: tmp-tmpfs
              mountPath: /tmp
            - name: unifi-os-server-data
              mountPath: /persistent
              subPath: persistent
            - name: unifi-os-server-data
              mountPath: /var/log
              subPath: log
            - name: unifi-os-server-data
              mountPath: /data
              subPath: data
            - name: unifi-os-server-data
              mountPath: /srv
              subPath: srv
            - name: unifi-os-server-data
              mountPath: /var/lib/unifi
              subPath: unifi
            - name: unifi-os-server-data
              mountPath: /var/lib/mongodb
              subPath: mongodb
            - name: unifi-os-server-data
              mountPath: /etc/rabbitmq/ssl
              subPath: rabbitmq
          startupProbe:
            httpGet:
              path: /api/ping
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 80
            periodSeconds: 60
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: run-tmpfs
          emptyDir:
            medium: Memory
        - name: tmp-tmpfs
          emptyDir:
            medium: Memory
        - name: unifi-os-server-data
          persistentVolumeClaim:
            claimName: unifi-os-server-pvc