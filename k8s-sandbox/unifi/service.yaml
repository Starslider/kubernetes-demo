apiVersion: v1
kind: Service
metadata:
  name: unifi
  labels:
    app.kubernetes.io/name: unifi
  annotations:
    external-dns.alpha.kubernetes.io/hostname: unifi.dhlabs.org
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
    - name: stun
      port: 3478
      targetPort: stun
      protocol: UDP
    - name: discovery
      port: 10001
      targetPort: discovery
      protocol: UDP
  selector:
    app.kubernetes.io/name: unifi
