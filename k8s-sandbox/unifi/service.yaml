apiVersion: v1
kind: Service
metadata:
  name: unifi
  labels:
    app.kubernetes.io/name: unifi
  # Note: Do NOT add external-dns hostname here.
  # The domain unifi.dhlabs.org is handled by the ingress-gateway
  # via its wildcard external-dns configuration + the HTTPRoute.
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
    - name: stun
      port: 3478
      targetPort: stun
      protocol: UDP
    - name: discovery
      port: 10001
      targetPort: discovery
      protocol: UDP
  selector:
    app.kubernetes.io/name: unifi