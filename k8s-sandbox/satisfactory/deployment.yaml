---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: satisfactory
  namespace: satisfactory
  labels:
    app: satisfactory
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: satisfactory
  template:
    metadata:
      labels:
        app: satisfactory
    spec:
      volumes:
        - name: satisfactory-config
          persistentVolumeClaim:
            claimName: satisfactory-config-pvc
        - name: ssh-config
          persistentVolumeClaim:
            claimName: ssh-config-pvc
      containers:
        - name: satisfactory
          image: wolveix/satisfactory-server:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: satisfactory-config
              mountPath: /config
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: MAXPLAYERS
              value: "8"
            - name: STEAMBETA
              value: "false"
            - name: AUTOSAVENUM
              value: "5"
            - name: DEBUG
              value: "false"
            - name: DISABLESEASONALEVENTS
              value: "false"
            - name: SERVERGAMEPORT
              value: "7777"
            - name: SERVERMESSAGINGPORT
              value: "8888"
            - name: SERVERSTREAMING
              value: "true"
            - name: SKIPUPDATE
              value: "false"
          ports:
            - name: game-udp
              containerPort: 7777
              protocol: UDP
            - name: game-tcp
              containerPort: 7777
              protocol: TCP
            - name: messaging
              containerPort: 8888
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /home/steam/healthcheck.sh
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 4
            successThreshold: 1
        - name: openssh-server
          image: lscr.io/linuxserver/openssh-server:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Zurich"
            - name: SUDO_ACCESS
              value: "false"
            - name: PASSWORD_ACCESS
              value: "true"
            - name: USER_NAME
              valueFrom:
                secretKeyRef:
                  name: ssh-sec
                  key: USER_NAME
            - name: USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ssh-sec
                  key: USER_PASSWORD
          volumeMounts:
            - name: ssh-config
              mountPath: /config
            - name: satisfactory-config
              mountPath: /satisfactory
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
