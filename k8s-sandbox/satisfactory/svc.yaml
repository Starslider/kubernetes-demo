apiVersion: v1
kind: Service
metadata:
  labels:
    app: satisfactory
  name: satisfactory
  namespace: satisfactory
spec:
  ports:
    - name: game-udp
      port: 7777
      protocol: UDP
      targetPort: 7777
    - name: game-tcp
      port: 7777
      protocol: TCP
      targetPort: 7777
    - name: messaging
      port: 8888
      protocol: TCP
      targetPort: 8888
  selector:
    app: satisfactory
  type: LoadBalancer
