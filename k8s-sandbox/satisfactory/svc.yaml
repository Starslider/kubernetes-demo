apiVersion: v1
kind: Service
metadata:
  labels:
    app: satisfactory
  name: satisfactory
  namespace: satisfactory
  annotations:
    external-dns.alpha.kubernetes.io/hostname: satisfactory.dhlabs.org
    external-dns.alpha.kubernetes.io/target: starslider.internet-box.ch
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  ports:
    - name: game-udp
      port: 7777
      protocol: UDP
      targetPort: 7777
    - name: game-tcp
      port: 7777
      protocol: TCP
      targetPort: 7777
    - name: messaging
      port: 8888
      protocol: TCP
      targetPort: 8888
  selector:
    app: satisfactory
  type: LoadBalancer
