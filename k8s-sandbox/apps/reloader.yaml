apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
spec:
  project: default
  sources:
    - repoURL: https://stakater.github.io/stakater-charts
      targetRevision: 1.0.16
      chart: reloader
      helm:
        valueFiles:
          - $values/k8s-sandbox/reloader/values.yaml

    - repoURL: https://github.com/Starslider/kubernetes-demo.git
      path: k8s-sandbox/reloader
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: reloader
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
